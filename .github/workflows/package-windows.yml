name: Package Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "docs/**"
      - "pages/**"
      - ".gitignore"
      - "AGENTS.md"
      - "CNAME"
      - "LICENSE"
      - "README.md"
      - "public-config.yaml"

permissions:
  contents: write

jobs:
  package-windows:
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Frontend build ──────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check frontend
        working-directory: frontend
        run: npx vue-tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npx vite build

      - name: Deploy frontend to app/web
        shell: powershell
        run: |
          # Replace original app/web with Vue build output for PyInstaller bundling
          Remove-Item -Path app\web -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -Path frontend\dist -Destination app\web -Recurse

      # ── Python build ────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --disable-pip-version-check
          pip install pyinstaller --disable-pip-version-check

      - name: Lint Python (Ruff)
        shell: powershell
        run: |
          pip install ruff --disable-pip-version-check
          ruff check app/ main.py --output-format github

      - name: Build executable
        shell: powershell
        run: |
          pyinstaller --clean --noconfirm vancesender.spec

      - name: Smoke test executable
        shell: powershell
        run: |
          chcp 65001 > $null
          .\dist\VanceSender\VanceSender.exe --help

      # ── Package & release ───────────────────────────────────
      - name: Create zip package
        shell: powershell
        run: |
          if (Test-Path .\dist\VanceSender-windows-x64.zip) {
            Remove-Item .\dist\VanceSender-windows-x64.zip -Force
          }
          Compress-Archive -Path .\dist\VanceSender -DestinationPath .\dist\VanceSender-windows-x64.zip -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: VanceSender-windows-x64
          path: dist/VanceSender-windows-x64.zip
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/VanceSender-windows-x64.zip
