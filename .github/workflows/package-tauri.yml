name: Package Tauri Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "docs/**"
      - "pages/**"
      - ".gitignore"
      - "AGENTS.md"
      - "CNAME"
      - "LICENSE"
      - "README.md"
      - "public-config.yaml"

permissions:
  contents: write

jobs:
  package-tauri:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Tool setup ─────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      # ── Frontend build ─────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Python backend build ───────────────────────────────
      - name: Deploy frontend to app/web (for PyInstaller)
        shell: powershell
        run: |
          Remove-Item -Path app\web -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -Path frontend\dist -Destination app\web -Recurse

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --disable-pip-version-check
          pip install pyinstaller --disable-pip-version-check

      - name: Build Python backend
        shell: powershell
        run: pyinstaller --clean --noconfirm vancesender.spec

      - name: Place backend into Tauri binaries
        shell: powershell
        run: |
          $backendSrc = "dist\VanceSender"
          $backendDest = "frontend\src-tauri\binaries\backend"

          if (Test-Path $backendDest) {
            Remove-Item -Path $backendDest -Recurse -Force
          }
          Copy-Item -Path $backendSrc -Destination $backendDest -Recurse

          if (!(Test-Path "$backendDest\VanceSender.exe")) {
            Write-Error "Backend executable not found at $backendDest\VanceSender.exe"
            exit 1
          }
          Write-Host "Backend placed at $backendDest"
          Get-ChildItem $backendDest | Select-Object Name, Length | Format-Table

      # ── Tauri build ────────────────────────────────────────
      - name: Build Tauri app
        working-directory: frontend
        env:
          TAURI_CONF_RESOURCES: '{"bundle":{"resources":{"binaries/backend/**":"./"}}}'
        run: npx tauri build --config "$env:TAURI_CONF_RESOURCES"

      # ── Collect artifacts ──────────────────────────────────
      - name: Collect installer artifacts
        id: artifacts
        shell: powershell
        run: |
          $bundleDir = "frontend\src-tauri\target\release\bundle"
          $outDir = "tauri-installers"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          # NSIS installer
          $nsisFiles = Get-ChildItem -Path "$bundleDir\nsis\*.exe" -ErrorAction SilentlyContinue
          foreach ($file in $nsisFiles) {
            Copy-Item $file.FullName "$outDir\"
            Write-Host "Found NSIS: $($file.Name)"
          }

          # MSI installer
          $msiFiles = Get-ChildItem -Path "$bundleDir\msi\*.msi" -ErrorAction SilentlyContinue
          foreach ($file in $msiFiles) {
            Copy-Item $file.FullName "$outDir\"
            Write-Host "Found MSI: $($file.Name)"
          }

          $totalFiles = (Get-ChildItem $outDir).Count
          if ($totalFiles -eq 0) {
            Write-Error "No installer files found!"
            exit 1
          }
          Write-Host "Total installer files: $totalFiles"

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: VanceSender-tauri-nsis
          path: tauri-installers/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: VanceSender-tauri-msi
          path: tauri-installers/*.msi
          if-no-files-found: warn
          retention-days: 14

      # ── GitHub Release ─────────────────────────────────────
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            tauri-installers/*.exe
            tauri-installers/*.msi
