name: Package Beta Build

on:
  workflow_dispatch:
    inputs:
      create_prerelease:
        description: "Create a GitHub Pre-release"
        required: false
        default: "false"
        type: boolean

  push:
    branches:
      - dev
    tags:
      - "v*-beta*"
      - "v*-rc*"
    paths-ignore:
      - "docs/**"
      - "pages/**"
      - ".gitignore"
      - "AGENTS.md"
      - "CNAME"
      - "LICENSE"
      - "README.md"
      - "public-config.yaml"

permissions:
  contents: write

jobs:
  package-beta:
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version info
        id: version
        shell: powershell
        run: |
          $ref = "${{ github.ref }}"
          $sha = "${{ github.sha }}".Substring(0, 7)

          if ($ref -match '^refs/tags/(.+)$') {
            $tag = $Matches[1]
            echo "VERSION=$tag" >> $env:GITHUB_OUTPUT
            echo "IS_TAG=true" >> $env:GITHUB_OUTPUT
            echo "ZIP_NAME=VanceSender-${tag}-windows-x64.zip" >> $env:GITHUB_OUTPUT
            echo "Detected tag: $tag"
          } else {
            # dev branch push or manual dispatch — read base version from app_meta
            $metaContent = Get-Content "app/core/app_meta.py" -Raw
            if ($metaContent -match 'APP_VERSION\s*=\s*"([^"]+)"') {
              $baseVersion = $Matches[1]
            } else {
              $baseVersion = "0.0.0"
            }
            $devVersion = "${baseVersion}-dev.${sha}"
            echo "VERSION=$devVersion" >> $env:GITHUB_OUTPUT
            echo "IS_TAG=false" >> $env:GITHUB_OUTPUT
            echo "ZIP_NAME=VanceSender-${devVersion}-windows-x64.zip" >> $env:GITHUB_OUTPUT
            echo "Detected dev version: $devVersion"
          }

      - name: Inject version into app_meta.py
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          # Strip leading 'v' if present for the Python constant
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          $metaPath = "app/core/app_meta.py"
          $content = Get-Content $metaPath -Raw
          $content = $content -replace 'APP_VERSION\s*=\s*"[^"]+"', "APP_VERSION = `"$version`""
          Set-Content -Path $metaPath -Value $content -NoNewline
          echo "Injected version: $version"
          Get-Content $metaPath

      # ── Frontend build ──────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check frontend
        working-directory: frontend
        run: npx vue-tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npx vite build

      # ── Python build ────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --disable-pip-version-check
          pip install pyinstaller --disable-pip-version-check

      - name: Lint Python (Ruff)
        shell: powershell
        run: |
          pip install ruff --disable-pip-version-check
          ruff check app/ main.py --output-format github

      - name: Build executable
        shell: powershell
        run: |
          pyinstaller --clean --noconfirm vancesender.spec

      - name: Smoke test executable
        shell: powershell
        run: |
          chcp 65001 > $null
          .\dist\VanceSender\VanceSender.exe --help

      # ── Package & release ───────────────────────────────────
      - name: Create zip package
        shell: powershell
        run: |
          $zipName = "${{ steps.version.outputs.ZIP_NAME }}"
          if (Test-Path ".\dist\$zipName") {
            Remove-Item ".\dist\$zipName" -Force
          }
          Compress-Archive -Path .\dist\VanceSender -DestinationPath ".\dist\$zipName" -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.ZIP_NAME }}
          path: dist/${{ steps.version.outputs.ZIP_NAME }}
          if-no-files-found: error
          retention-days: 14

      # Publish Pre-release for beta/rc tags
      - name: Publish GitHub Pre-release (tag)
        if: steps.version.outputs.IS_TAG == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }} (Beta)"
          generate_release_notes: true
          prerelease: true
          files: dist/${{ steps.version.outputs.ZIP_NAME }}

      # Publish Pre-release for manual dispatch (if requested)
      - name: Publish GitHub Pre-release (manual)
        if: >-
          steps.version.outputs.IS_TAG == 'false' &&
          github.event_name == 'workflow_dispatch' &&
          inputs.create_prerelease == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.VERSION }}"
          name: "v${{ steps.version.outputs.VERSION }} (Dev Build)"
          body: |
            🧪 **Development build** from `${{ github.ref_name }}` branch.

            Commit: ${{ github.sha }}
            Triggered by: manual workflow dispatch
          prerelease: true
          files: dist/${{ steps.version.outputs.ZIP_NAME }}
